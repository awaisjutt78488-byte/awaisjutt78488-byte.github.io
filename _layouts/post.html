---
layout: default
---

<article class="post-shell">
  <a class="back-link" href="{{ "/blog/" | relative_url }}">Back to Blog</a>
  <div class="post-card">
    {% assign cover = page.image | default: '/assets/images/posts/default-post-cover.svg' %}
    <figure class="post-feature-media">
      <img src="{{ cover | relative_url }}" alt="{{ page.image_alt | default: page.title }}" decoding="async" />
    </figure>
    {% include meta.html post=page %}
    <div class="post-content">
      {{ content }}
    </div>
  </div>
</article>
