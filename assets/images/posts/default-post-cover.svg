<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 900' role='img' aria-labelledby='title desc'>
  <title id='title'>New Post Personal Experience</title>
  <desc id='desc'>Add a markdown file on GitHub and this cover will still work.</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#FDF7EE'/>
      <stop offset='100%' stop-color='#F2E4CE'/>
    </linearGradient>
    <linearGradient id='glow' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#2456D3' stop-opacity='0.16'/>
      <stop offset='100%' stop-color='#F3B24B' stop-opacity='0.06'/>
    </linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='16' stdDeviation='24' flood-color='#2d2419' flood-opacity='0.12'/>
    </filter>
  </defs>
  <rect width='1600' height='900' rx='40' fill='url(#bg)'/>
  <circle cx='1320' cy='182' r='230' fill='url(#glow)'/>
  <circle cx='1388' cy='736' r='260' fill='url(#glow)' opacity='0.7'/>
  <path d='M98 746 C 304 688, 548 678, 858 740' fill='none' stroke='#2d2419' stroke-opacity='0.08' stroke-width='10' stroke-linecap='round'/>
  <rect x='918' y='102' width='590' height='696' rx='36' fill='#ffffff' fill-opacity='0.48' filter='url(#shadow)'/>
  <text x='100' y='118' font-family='Segoe UI, Arial, sans-serif' font-size='26' letter-spacing='8' fill='#9f4f20'>GitHub Friendly</text>
  <text x='100' y='250' font-family='Segoe UI, Arial, sans-serif' font-size='96' font-weight='800' fill='#2d2419'>New Post</text>
  <text x='100' y='346' font-family='Segoe UI, Arial, sans-serif' font-size='70' font-weight='800' fill='#2456D3'>Personal Experience</text>
  <text x='100' y='468' font-family='Segoe UI, Arial, sans-serif' font-size='34' fill='#65584a'>Add a markdown file on GitHub and</text>
  <text x='100' y='510' font-family='Segoe UI, Arial, sans-serif' font-size='34' fill='#65584a'>this cover will still work.</text>
  <rect x='100' y='620' width='220' height='14' rx='7' fill='#F3B24B'/>
  <rect x='100' y='656' width='132' height='14' rx='7' fill='#2456D3' opacity='0.9'/>
  <g transform='translate(930 122)'>
    <rect x='132' y='126' width='500' height='324' rx='28' fill='white' opacity='0.9' stroke='#2456D3' stroke-width='14'/>
<path d='M192 244 H560 M192 304 H520 M192 364 H468' stroke='#2456D3' stroke-width='14' stroke-linecap='round'/>
<circle cx='560' cy='210' r='32' fill='#F3B24B'/>
<circle cx='504' cy='404' r='20' fill='#2456D3'/>
