<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 900' role='img' aria-labelledby='title desc'>
  <title id='title'>Moving to Faisalabad</title>
  <desc id='desc'>A big move from Shorkot that built independence.</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#F7F3EB'/>
      <stop offset='100%' stop-color='#E2F1EE'/>
    </linearGradient>
    <linearGradient id='glow' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#1E6E6A' stop-opacity='0.16'/>
      <stop offset='100%' stop-color='#F2A95B' stop-opacity='0.06'/>
    </linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='16' stdDeviation='24' flood-color='#2d2419' flood-opacity='0.12'/>
    </filter>
  </defs>
  <rect width='1600' height='900' rx='40' fill='url(#bg)'/>
  <circle cx='1320' cy='182' r='230' fill='url(#glow)'/>
  <circle cx='1388' cy='736' r='260' fill='url(#glow)' opacity='0.7'/>
  <path d='M98 746 C 304 688, 548 678, 858 740' fill='none' stroke='#2d2419' stroke-opacity='0.08' stroke-width='10' stroke-linecap='round'/>
  <rect x='918' y='102' width='590' height='696' rx='36' fill='#ffffff' fill-opacity='0.48' filter='url(#shadow)'/>
  <text x='100' y='118' font-family='Segoe UI, Arial, sans-serif' font-size='26' letter-spacing='8' fill='#9f4f20'>Change and Movement</text>
  <text x='100' y='250' font-family='Segoe UI, Arial, sans-serif' font-size='96' font-weight='800' fill='#2d2419'>Moving to</text>
  <text x='100' y='346' font-family='Segoe UI, Arial, sans-serif' font-size='90' font-weight='800' fill='#1E6E6A'>Faisalabad</text>
  <text x='100' y='468' font-family='Segoe UI, Arial, sans-serif' font-size='34' fill='#65584a'>A big move from Shorkot that built</text>
  <text x='100' y='510' font-family='Segoe UI, Arial, sans-serif' font-size='34' fill='#65584a'>independence.</text>
  <rect x='100' y='620' width='220' height='14' rx='7' fill='#F2A95B'/>
  <rect x='100' y='656' width='132' height='14' rx='7' fill='#1E6E6A' opacity='0.9'/>
  <g transform='translate(930 122)'>
    <path d='M105 430 C 170 250, 270 210, 350 315 S 470 420, 520 250' fill='none' stroke='#1E6E6A' stroke-width='18' stroke-linecap='round' stroke-dasharray='16 20'/>
<circle cx='105' cy='430' r='28' fill='#F2A95B'/>
<circle cx='520' cy='250' r='28' fill='#1E6E6A'/>
<path d='M78 170 C 78 134, 108 110, 142 110 C 176 110, 206 134, 206 170 C 206 240, 142 296, 142 296 C 142 296, 78 240, 78 170 Z' fill='#1E6E6A' fill-opacity='0.14' stroke='#1E6E6A' stroke-width='14'/>
<circle cx='142' cy='170' r='24' fill='#F2A95B'/>
