<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 900' role='img' aria-labelledby='title desc'>
  <title id='title'>Effort and Consistency</title>
  <desc id='desc'>Small repeated steps that slowly built confidence.</desc>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#F7F4EB'/>
      <stop offset='100%' stop-color='#E4F3EB'/>
    </linearGradient>
    <linearGradient id='glow' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#1E7A55' stop-opacity='0.16'/>
      <stop offset='100%' stop-color='#F2B45B' stop-opacity='0.06'/>
    </linearGradient>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='16' stdDeviation='24' flood-color='#2d2419' flood-opacity='0.12'/>
    </filter>
  </defs>
  <rect width='1600' height='900' rx='40' fill='url(#bg)'/>
  <circle cx='1320' cy='182' r='230' fill='url(#glow)'/>
  <circle cx='1388' cy='736' r='260' fill='url(#glow)' opacity='0.7'/>
  <path d='M98 746 C 304 688, 548 678, 858 740' fill='none' stroke='#2d2419' stroke-opacity='0.08' stroke-width='10' stroke-linecap='round'/>
  <rect x='918' y='102' width='590' height='696' rx='36' fill='#ffffff' fill-opacity='0.48' filter='url(#shadow)'/>
  <text x='100' y='118' font-family='Segoe UI, Arial, sans-serif' font-size='26' letter-spacing='8' fill='#9f4f20'>Steady Progress</text>
  <text x='100' y='250' font-family='Segoe UI, Arial, sans-serif' font-size='96' font-weight='800' fill='#2d2419'>Effort and</text>
  <text x='100' y='346' font-family='Segoe UI, Arial, sans-serif' font-size='90' font-weight='800' fill='#1E7A55'>Consistency</text>
  <text x='100' y='468' font-family='Segoe UI, Arial, sans-serif' font-size='34' fill='#65584a'>Small repeated steps that slowly</text>
  <text x='100' y='510' font-family='Segoe UI, Arial, sans-serif' font-size='34' fill='#65584a'>built confidence.</text>
  <rect x='100' y='620' width='220' height='14' rx='7' fill='#F2B45B'/>
  <rect x='100' y='656' width='132' height='14' rx='7' fill='#1E7A55' opacity='0.9'/>
  <g transform='translate(930 122)'>
    <rect x='122' y='404' width='118' height='58' rx='16' fill='#F2B45B'/>
<rect x='240' y='346' width='118' height='116' rx='16' fill='#1E7A55'/>
<rect x='358' y='282' width='118' height='180' rx='16' fill='#F2B45B'/>
<rect x='476' y='210' width='118' height='252' rx='16' fill='#1E7A55'/>
<circle cx='534' cy='176' r='28' fill='#F2B45B'/>
<path d='M178 250 C 244 230, 298 226, 360 238 S 470 210, 534 176' fill='none' stroke='#1E7A55' stroke-width='16' stroke-linecap='round'/>
  </g>
</svg>
