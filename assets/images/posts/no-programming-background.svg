      <stop offset='0%' stop-color='#FAF5EE'/>
      <stop offset='100%' stop-color='#EEE8FB'/>
    </linearGradient>
    <linearGradient id='glow' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='#5B4FB2' stop-opacity='0.16'/>
