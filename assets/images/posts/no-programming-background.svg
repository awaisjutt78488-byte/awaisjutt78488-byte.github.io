<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 900' role='img' aria-labelledby='title desc'>
  <title id='title'>No Programming Background</title>
  <desc id='desc'>Starting from the basics and catching up step by step.</desc>
